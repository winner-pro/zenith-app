<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITH V15 ULTRA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .card { border: 1px solid var(--gold); border-radius: 15px; padding: 20px; background: rgba(255,255,255,0.03); margin-top: 20px; }
        .prediction { font-size: 48px; font-weight: bold; color: var(--gold); margin: 20px 0; text-shadow: 0 0 15px rgba(212,175,55,0.5); }
        .loader { border: 4px solid #111; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background: var(--gold); color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        canvas { margin-top: 20px; max-height: 150px; }
    </style>
</head>
<body>
    <div style="color: var(--gold); font-weight: bold; letter-spacing: 1px;">🦅 ZENITH INTELLIGENCE V15</div>
    
    <div class="card">
        <div id="loader" class="loader"></div>
        <div id="signal" class="prediction">--.--x</div>
        <div id="confidence-box" style="font-size: 12px; color: #888; margin-bottom: 10px;">PRÉCISION : <span id="precision">0</span>%</div>
        <button class="btn" onclick="startAnalysis()">LANCER L'ANALYSE IA</button>
    </div>

    <div class="card">
        <canvas id="historyChart"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Initialisation du Graphique
        const ctx = document.getElementById('historyChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#d4af37', tension: 0.4, pointRadius: 0 }] },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });

        async function startAnalysis() {
            const signalDiv = document.getElementById('signal');
            const loader = document.getElementById('loader');
            const prec = document.getElementById('precision');
            
            signalDiv.style.display = 'none';
            loader.style.display = 'block';
            tg.HapticFeedback.impactOccurred('medium');

            try {
                // Remplacer par ton lien Cloudflare actuel
                const response = await fetch('https://trail-attendance-apt-implement.trycloudflare.com/signal');
                const data = await response.json();

                setTimeout(() => {
                    loader.style.display = 'none';
                    signalDiv.style.display = 'block';
                    signalDiv.innerText = data.signal + "x";
                    prec.innerText = Math.floor(Math.random() * (98 - 85 + 1)) + 85;
                    
                    // Mise à jour graphique
                    chart.data.labels = data.history.map((_, i) => i);
                    chart.data.datasets[0].data = data.history.reverse();
                    chart.update();
                    
                    tg.HapticFeedback.notificationOccurred('success');
                }, 1500); // Délai artificiel pour le "timing" crédible
            } catch (e) {
                signalDiv.innerText = "ERREUR";
                loader.style.display = 'none';
                signalDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
