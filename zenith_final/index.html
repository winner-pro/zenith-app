<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZENITH V17 COMPETITION</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--gold:#d4af37;
--dark:#050505;
--green:#00ff9d;
--red:#ff4d4d;
}

body{
background:var(--dark);
color:white;
font-family:sans-serif;
margin:0;
padding:15px;
text-align:center;
}

.card{
border:1px solid var(--gold);
border-radius:15px;
padding:20px;
background:rgba(255,255,255,0.03);
margin-top:20px;
}

.prediction{
font-size:52px;
font-weight:bold;
color:var(--gold);
text-shadow:0 0 20px rgba(212,175,55,0.6);
}

.loader{
border:4px solid #111;
border-top:4px solid var(--gold);
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:20px auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.btn{
background:var(--gold);
color:black;
border:none;
padding:15px;
border-radius:10px;
font-weight:bold;
width:100%;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.copy{
background:#111;
color:var(--gold);
border:1px solid var(--gold);
}

.timer{
font-size:20px;
margin-top:10px;
}

.countdown{
font-size:32px;
color:var(--green);
font-weight:bold;
}

.stat{
font-size:13px;
margin-top:5px;
}

canvas{
margin-top:20px;
max-height:160px;
}

</style>

</head>

<body>

<div style="color:var(--gold);font-weight:bold;">🦅 ZENITH INTELLIGENCE V17</div>

<div class="card">

<div id="loader" class="loader"></div>

<div id="signal" class="prediction">--.--x</div>

<div class="timer">⏳ PROCHAIN SIGNAL</div>

<div id="countdown" class="countdown">00:00</div>

<div class="stat">
PRÉCISION IA : <span id="precision">0</span>%
</div>

<div class="stat">
PATTERN : <span id="pattern">---</span>
</div>

<div class="stat">
STATUS : <span id="risk">---</span>
</div>

<button class="btn" onclick="startAnalysis()">LANCER ANALYSE IA</button>

<button class="btn copy" onclick="copySignal()">COPIER SIGNAL</button>

</div>

<div class="card">

<div class="stat">
SIGNALS RÉUSSIS : <span id="win">0</span> / <span id="total">0</span>
</div>

<canvas id="historyChart"></canvas>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

let win=0
let total=0

const signalDiv=document.getElementById("signal")
const loader=document.getElementById("loader")
const precision=document.getElementById("precision")
const pattern=document.getElementById("pattern")
const risk=document.getElementById("risk")

const countdown=document.getElementById("countdown")

// GRAPH

const ctx=document.getElementById("historyChart").getContext("2d")

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
data:[],
borderColor:"#d4af37",
tension:0.4,
pointRadius:0
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false},y:{display:false}}
}
})

// COUNTDOWN

function startCountdown(seconds){

let timer=seconds

const interval=setInterval(()=>{

let m=Math.floor(timer/60)
let s=timer%60

countdown.innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

timer--

if(timer<0){

clearInterval(interval)
countdown.innerText="SIGNAL 🔔"

}

},1000)

}

// ANALYSIS

async function startAnalysis(){

signalDiv.style.display="none"
loader.style.display="block"

tg.HapticFeedback.impactOccurred("medium")

try{

const response=await fetch("https://trail-attendance-apt-implement.trycloudflare.com/signal")

const data=await response.json()

setTimeout(()=>{

loader.style.display="none"
signalDiv.style.display="block"

signalDiv.innerText=data.signal+"x"

const conf=Math.floor(Math.random()*13)+85

precision.innerText=conf

const patterns=["SPIKE","STABLE","VOLATILE"]
pattern.innerText=patterns[Math.floor(Math.random()*patterns.length)]

risk.innerText=conf>92?"SAFE":"RISK"

risk.style.color=conf>92?"#00ff9d":"#ff4d4d"

// stats

total++

if(conf>90)win++

document.getElementById("win").innerText=win
document.getElementById("total").innerText=total

// graph

chart.data.labels=data.history.map((_,i)=>i)
chart.data.datasets[0].data=data.history.slice(-20)
chart.update()

startCountdown(20)

tg.HapticFeedback.notificationOccurred("success")

},1200)

}catch(e){

signalDiv.innerText="ERREUR"
loader.style.display="none"
signalDiv.style.display="block"

}

}

function copySignal(){

navigator.clipboard.writeText(signalDiv.innerText)

tg.HapticFeedback.notificationOccurred("success")

}

</script>

</body>
</html>
