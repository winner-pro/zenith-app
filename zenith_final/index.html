<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITH AI - V13 LABORATOIRE VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #050505; color: #d4af37; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 15px; }
        .header { border: 1px solid #d4af37; padding: 10px; border-radius: 10px; margin-bottom: 15px; background: rgba(212, 175, 55, 0.05); }
        .vip-section { border: 2px solid #d4af37; border-radius: 15px; padding: 15px; background: linear-gradient(145deg, #111, #000); margin-top: 20px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        h2 { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        textarea { width: 90%; height: 80px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: monospace; margin-bottom: 10px; }
        .btn-vip { background: #d4af37; color: #000; border: none; padding: 12px 25px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }
        .result-panel { margin-top: 15px; padding: 10px; background: rgba(0,255,0,0.05); border-radius: 8px; display: none; text-align: left; font-size: 13px; }
        .danger { color: #ff4444; }
        .success { color: #00ff00; }
        .warning { color: #ffbb00; }
        .info-label { color: #888; font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">🦅 ZENITH COMMAND V13<br><span style="font-size:10px;">UNITÉ D'ANALYSE TACTIQUE</span></div>

    <div class="vip-section">
        <h2>💎 LABORATOIRE VIP</h2>
        <p style="font-size: 11px; color: #aaa;">Collez les 5 à 20 dernières cotes (ex: 1.50, 2.10, 1.02...)</p>
        <textarea id="history-input" placeholder="1.20, 4.50, 1.05, 2.80..."></textarea>
        <button class="btn-vip" onclick="analyzeVIP()">CALCULER STRATÉGIE</button>

        <div id="vip-results" class="result-panel">
            <div id="market-status"></div>
            <hr style="border: 0.5px solid #333;">
            <div id="prediction-output"></div>
            <div id="risk-management" style="margin-top:10px; font-style: italic; color: #fff;"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function analyzeVIP() {
            const input = document.getElementById('history-input').value;
            const results = document.getElementById('vip-results');
            
            // Nettoyage des données (on extrait les chiffres)
            const cotes = input.split(/[,\s]+/).map(Number).filter(n => !isNaN(n));

            if (cotes.length < 3) {
                alert("Veuillez entrer au moins 3 cotes pour une analyse fiable.");
                return;
            }

            results.style.display = 'block';
            tg.HapticFeedback.impactOccurred('medium');

            const lastCotes = cotes.slice(-5); // Analyse des 5 dernières
            const average = lastCotes.reduce((a, b) => a + b, 0) / lastCotes.length;
            const lowCotes = lastCotes.filter(c => c < 1.5).length;

            let statusHTML = "";
            let predHTML = "";
            let riskHTML = "";

            // LOGIQUE DE DÉTECTION DE CYCLE
            if (lowCotes >= 3) {
                statusHTML = "<b class='danger'>🚨 ÉTAT DU MARCHÉ : RÉCUPÉRATION (FROID)</b><br><span class='info-label'>Le casino récupère les gains. Risque de crash à 1.0x élevé.</span>";
                predHTML = "🎯 PRÉDICTION : <span class='danger'>AUCUN SIGNAL</span>";
                riskHTML = "🛡️ CONSEIL : Ne jouez pas. Attendez 3 tours > 2.00x avant de reprendre.";
            } else if (average > 3) {
                statusHTML = "<b class='success'>🔥 ÉTAT DU MARCHÉ : DISTRIBUTION (CHAUD)</b><br><span class='info-label'>Cycle favorable détecté. Les algorithmes libèrent des cotes.</span>";
                predHTML = "🎯 PRÉDICTION : <b>1.80x - 2.50x</b>";
                riskHTML = "💰 STRATÉGIE : Mise agressive (5% du capital). Encaissement auto à 1.50x pour sécuriser.";
            } else {
                statusHTML = "<b class='warning'>⚖️ ÉTAT DU MARCHÉ : STABLE / NEUTRE</b><br><span class='info-label'>Flux régulier sans anomalie détectée.</span>";
                predHTML = "🎯 PRÉDICTION : <b>1.30x - 1.50x</b>";
                riskHTML = "🛡️ STRATÉGIE : Mise prudente (2% du capital). Ne cherchez pas les gros multiplicateurs.";
            }

            document.getElementById('market-status').innerHTML = statusHTML;
            document.getElementById('prediction-output').innerHTML = predHTML;
            document.getElementById('risk-management').innerText = riskHTML;
        }
    </script>
</body>
</html>
