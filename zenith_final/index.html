<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITH PRESTIGE V14</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Menu Onglets */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--gold); z-index: 100; }
        .tab-item { color: #666; font-size: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .tab-item.active { color: var(--gold); font-weight: bold; }

        .content { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Design Cartes */
        .card { background: var(--glass); border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .gold-text { color: var(--gold); font-weight: bold; }
        
        .btn-gold { background: var(--gold); color: black; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: 900; margin-top: 10px; }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        
        .status-dot { height: 8px; width: 8px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

    <div id="radar" class="content active">
        <h2 class="gold-text">🦅 RADAR ZENITH</h2>
        <div class="card">
            <div style="font-size: 12px;"><span class="status-dot"></span> SYNC. SERVEUR: <span class="gold-text">ACTIF</span></div>
            <div style="font-size: 24px; margin: 20px 0;">PRÊT POUR SCAN</div>
            <button class="btn-gold" onclick="alert('Scan lancé...')">LANCER SCAN ÉLITE</button>
        </div>
        <div class="card" style="font-size: 11px; color: #888;">
            DERNIER SIGNAL : <span class="gold-text">14.50x ✅</span> (Il y a 2 min)
        </div>
    </div>

    <div id="vip" class="content">
        <h2 class="gold-text">💎 LABORATOIRE VIP</h2>
        <div class="card">
            <p style="font-size: 12px;">INJECTEUR DE DONNÉES HISTORIQUES</p>
            <textarea id="history" rows="4" placeholder="Ex: 1.20, 5.40, 1.05..."></textarea>
            <button class="btn-gold" onclick="alert('Analyse en cours...')">ANALYSER LE CYCLE</button>
        </div>
    </div>

    <div id="account" class="content">
        <h2 class="gold-text">👤 MON DASHBOARD</h2>
        <div class="card">
            <div style="display: flex; justify-content: space-between;">
                <span>STATUT :</span>
                <span class="gold-text">MEMBRE VIP</span>
            </div>
            <div style="margin-top: 10px; height: 5px; background: #333; border-radius: 5px;">
                <div style="width: 70%; height: 100%; background: var(--gold); border-radius: 5px;"></div>
            </div>
            <p style="font-size: 10px; color: #888;">Validité : 22 jours restants</p>
        </div>
        <div class="card">
            <p style="font-size: 12px;">REVENUS SIMULÉS : <span class="gold-text">145,000 XOF</span></p>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="openTab(event, 'radar')">Radar</div>
        <div class="tab-item" onclick="openTab(event, 'vip')">Labo VIP</div>
        <div class="tab-item" onclick="openTab(event, 'account')">Dashboard</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openTab(evt, tabName) {
            let i, content, tabLinks;
            content = document.getElementsByClassName("content");
            for (i = 0; i < content.length; i++) { content[i].style.display = "none"; content[i].classList.remove("active"); }
            tabLinks = document.getElementsByClassName("tab-item");
            for (i = 0; i < tabLinks.length; i++) { tabLinks[i].classList.remove("active"); }
            document.getElementById(tabName).style.display = "block";
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>
