<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENITH EMPIRE V10</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f0f0f;
color:gold;
font-family:sans-serif;
text-align:center;
margin:0;
padding:0;
}

header{
padding:20px;
font-size:1.5em;
font-weight:bold;
letter-spacing:2px;
}

.card{
border:2px solid gold;
border-radius:15px;
margin:20px;
padding:25px;
background:#1a1a1a;
box-shadow:0 0 20px rgba(255,215,0,0.3);
}

.signal{
font-size:3.5em;
font-weight:bold;
text-shadow:0 0 15px gold;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

.timer{
color:#ff4444;
font-size:1.2em;
margin-top:10px;
}

.status{
color:#00ff88;
font-size:0.9em;
margin-top:10px;
}

button{
background:gold;
color:black;
border:none;
padding:15px 30px;
border-radius:10px;
font-weight:bold;
margin:10px;
}

.refresh{
background:#00ccff;
}

</style>
</head>

<body>

<header>🦅 ZENITH COMMAND</header>

<div class="card">

<div>📡 COTE PRÉDITE</div>

<div class="signal" id="val">--x</div>

<div class="timer" id="wait">Connexion au moteur IA...</div>

<div class="status" id="status">ANALYSE EN COURS...</div>

</div>

<button class="refresh" onclick="simulate()">🔄 ACTUALISER</button>

<button onclick="Telegram.WebApp.close()">❌ QUITTER</button>

<script>

let tg = window.Telegram.WebApp;
tg.expand();

function updateSignal(value,time,status){

document.getElementById("val").innerText=value+"x";
document.getElementById("wait").innerText="Fenêtre : "+time;
document.getElementById("status").innerText=status;

tg.HapticFeedback.notificationOccurred("success");

}

function simulate(){

let value=(Math.random()*10+1).toFixed(2);
let time=Math.floor(Math.random()*30)+"s";
let status="SIGNAL VALIDÉ";

updateSignal(value,time,status);

}

setTimeout(simulate,2000);

</script>

</body>
</html>
