<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITH AI - V11</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #050505; color: #d4af37; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; padding: 20px; }
        .header { border: 1px solid #d4af37; padding: 10px; border-radius: 5px; margin-bottom: 20px; background: rgba(212, 175, 55, 0.05); }
        .progress-container { width: 100%; background: #222; border-radius: 10px; height: 10px; margin: 20px 0; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #d4af37, #fff); transition: width 0.1s; }
        .log-box { font-size: 12px; color: #aaa; height: 40px; margin: 10px 0; }
        .prediction-box { background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, rgba(0,0,0,1) 100%); border-radius: 50%; width: 200px; height: 200px; line-height: 200px; margin: 20px auto; border: 2px solid #d4af37; font-size: 40px; font-weight: bold; box-shadow: 0 0 30px #d4af37; display: none; }
        .btn-ai { background: transparent; color: #d4af37; border: 2px solid #d4af37; padding: 15px 30px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-ai:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>
    <div class="header">🦅 ZENITH INTELLIGENCE V11<br><small>RADAR SITE WEB : CONNECTÉ</small></div>
    
    <div id="main-ui">
        <p style="color:white;">SYSTÈME D'ANALYSE PRÉDICTIF</p>
        <button class="btn-ai" onclick="runAI()">Lancer l'Analyse IA</button>
    </div>

    <div id="processing" style="display:none;">
        <div class="log-box" id="ai-logs">Initialisation du flux...</div>
        <div class="progress-container" id="p-cont"><div class="progress-bar" id="p-bar"></div></div>
    </div>

    <div class="prediction-box" id="result-box">--.--x</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function runAI() {
            const logs = ["Scan des 100 dernières cotes...", "Calcul des probabilités...", "Analyse des cycles de perte...", "Détection Zone Chaude...", "Cote identifiée !"];
            const ui = document.getElementById('main-ui');
            const proc = document.getElementById('processing');
            const bar = document.getElementById('p-bar');
            const logBox = document.getElementById('ai-logs');
            const result = document.getElementById('result-box');
            const pCont = document.getElementById('p-cont');

            ui.style.display = 'none';
            result.style.display = 'none';
            proc.style.display = 'block';
            pCont.style.display = 'block';
            
            let width = 0;
            let logIndex = 0;

            const interval = setInterval(() => {
                width += 2;
                bar.style.width = width + '%';
                
                if (width % 20 === 0 && logIndex < logs.length) {
                    logBox.innerText = logs[logIndex];
                    logIndex++;
                }

                if (width >= 100) {
                    clearInterval(interval);
                    showResult();
                }
            }, 50);
        }

        function showResult() {
            document.getElementById('processing').style.display = 'none';
            const resBox = document.getElementById('result-box');
            const cote = (Math.random() * (8.50 - 1.30) + 1.30).toFixed(2);
            resBox.innerText = cote + "x";
            resBox.style.display = 'block';
            tg.HapticFeedback.notificationOccurred('success');
            
            setTimeout(() => {
                document.getElementById('main-ui').style.display = 'block';
            }, 3000);
        }
    </script>
</body>
</html>
